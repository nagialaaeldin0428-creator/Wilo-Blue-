<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#051026" />
      <stop offset="50%" stop-color="#0b244d" />
      <stop offset="100%" stop-color="#020914" />
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72dfff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#12c2e9" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="wiloBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dffffd" />
      <stop offset="40%" stop-color="#5edeff" />
      <stop offset="100%" stop-color="#006fa3" />
    </linearGradient>
    <linearGradient id="wiloBelly" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a6f1ff" />
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe485" />
      <stop offset="20%" stop-color="#f5af19" />
      <stop offset="100%" stop-color="#f5af19" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card Canvas -->
  <rect width="400" height="600" rx="20" fill="url(#bgGrad)" stroke="#1a3b6c" stroke-width="4" />
  <rect x="12" y="12" width="376" height="576" rx="14" fill="none" stroke="#2a5c9b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" />

  <!-- Radiating Energy Rays & Water Ripples -->
  <ellipse cx="200" cy="300" rx="180" ry="180" fill="url(#ringGlow)" />
  <circle cx="200" cy="300" r="140" fill="none" stroke="#3bc4ff" stroke-width="1" opacity="0.15" />
  <circle cx="200" cy="300" r="100" fill="none" stroke="#3bc4ff" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.25" />

  <!-- Bioluminescent Ambient Floating Particles -->
  <circle cx="80" cy="120" r="4" fill="#6bf0ff" filter="url(#softGlow)" opacity="0.8" />
  <circle cx="320" cy="180" r="6" fill="#fddfa2" filter="url(#softGlow)" opacity="0.75" />
  <circle cx="110" cy="480" r="5" fill="#6df" filter="url(#softGlow)" opacity="0.6" />
  <circle cx="290" cy="440" r="3" fill="#6df" filter="url(#softGlow)" opacity="0.5" />

  <!-- WILO BLUE ARTWORK -->
  <g transform="translate(15, 30)">
    <!-- Tail Fin (Whimsical flowy design) -->
    <path d="M250 250 C310 180 340 170 360 210 C330 220 310 240 290 270 C320 300 350 330 360 360 C320 360 290 330 250 280 Z" fill="#006fa3" stroke="#90f3ff" stroke-width="2.5" />
    <path d="M254 260 C290 210 310 200 325 220 C305 230 290 250 275 275 C295 300 315 320 320 340 C295 340 275 320 254 285 Z" fill="#038fd1" opacity="0.7" />

    <!-- Main Whale Body -->
    <path d="M50 270 C60 160 140 110 240 130 C300 150 320 210 310 270 C305 340 240 380 160 370 C70 360 40 330 50 270 Z" fill="url(#wiloBody)" stroke="#dffffd" stroke-opacity="0.8" stroke-width="3" />

    <!-- Underbelly (glowing & smooth) -->
    <path d="M80 300 C120 360 230 380 280 310 C240 365 140 375 75 325 C68 318 64 305 70 290 Z" fill="url(#wiloBelly)" opacity="0.95" />

    <!-- Cute Glowing Flippers (Fins) -->
    <path d="M140 310 C120 360 80 370 50 360 C80 330 110 310 140 280 Z" fill="#00689b" stroke="#7cf0ff" stroke-width="2" />
    <path d="M135 295 C120 335 90 345 65 340 C85 315 110 300 135 275 Z" fill="#2098d5" opacity="0.8" />

    <!-- Big Adorable Black Eye -->
    <circle cx="120" cy="225" r="22" fill="#021428" />
    
    <!-- Magical Glowing Golden Iris (representing internal waking power) -->
    <circle cx="122" cy="225" r="14" fill="#f5af19" filter="url(#softGlow)" />
    <circle cx="122" cy="225" r="9" fill="#ffe259" />
    
    <!-- White Eye Shine / Sparkle -->
    <circle cx="114" cy="216" r="5" fill="#ffffff" />
    <circle cx="126" cy="232" r="2" fill="#ffffff" />

    <!-- Heartwarming Whale Smile -->
    <path d="M75 275 C100 305 140 310 175 295" fill="none" stroke="#042c52" stroke-width="5" stroke-linecap="round" opacity="0.7" />

    <!-- Splashing Bubbles around Wilo -->
    <circle cx="35" cy="180" r="10" fill="none" stroke="#72dfff" stroke-width="2.5" opacity="0.8" />
    <circle cx="28" cy="184" r="3" fill="#72dfff" opacity="0.5" />

    <circle cx="65" cy="100" r="8" fill="none" stroke="#72dfff" stroke-width="2" opacity="0.7" />
    <circle cx="310" cy="110" r="12" fill="none" stroke="#72dfff" stroke-width="3" opacity="0.6" />
  </g>

  <!-- Glowing Title Card Accent -->
  <text x="200" y="540" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="bold" font-size="28" fill="#72dfff" text-anchor="middle" filter="url(#softGlow)">WILO</text>
  <text x="200" y="565" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7aacc4" text-anchor="middle" letter-spacing="3">THE LOST ONE</text>
</svg>
