<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14061a" />
      <stop offset="50%" stop-color="#341324" />
      <stop offset="100%" stop-color="#0a020d" />
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9955" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="hakBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb794" />
      <stop offset="55%" stop-color="#ff7a45" />
      <stop offset="100%" stop-color="#993200" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card Canvas -->
  <rect width="400" height="600" rx="20" fill="url(#bgGrad)" stroke="#5e2913" stroke-width="4" />
  <rect x="12" y="12" width="376" height="576" rx="14" fill="none" stroke="#994c26" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" />

  <!-- Radiating Energy Rays & Water Waves -->
  <ellipse cx="200" cy="300" rx="180" ry="180" fill="url(#ringGlow)" />
  <circle cx="200" cy="300" r="115" fill="none" stroke="#ffaa66" stroke-width="1.2" stroke-dasharray="8,4" opacity="0.25" />

  <!-- Bioluminescent Ancient Specks & Air Bubbles -->
  <circle cx="110" cy="120" r="5" fill="#fbcfe8" filter="url(#softGlow)" opacity="0.8" />
  <circle cx="300" cy="460" r="4" fill="#fed7aa" filter="url(#softGlow)" opacity="0.75" />
  <circle cx="80" cy="480" r="3" fill="#ff7a45" filter="url(#softGlow)" opacity="0.6" />

  <!-- HAKMOON OCTOPUS ARTWORK (Wise Learned Octopus with Monocle) -->
  <g transform="translate(10, -10)">
    <!-- Curly Wise Tentacles (arranged elegantly in vector swoops) -->
    <!-- Tentacle Left 1 -->
    <path d="M120 280 C90 280 40 310 50 350 C60 380 110 380 120 340" fill="none" stroke="#ff7a45" stroke-width="32" stroke-linecap="round" />
    <path d="M120 280 C90 280 40 310 50 350 C60 380 110 380 120 340" fill="none" stroke="#e05822" stroke-width="24" stroke-linecap="round" opacity="0.8" />
    <!-- Suckers on Tentacle Left 1 -->
    <circle cx="48" cy="328" r="5" fill="#ffd4bd" />
    <circle cx="58" cy="358" r="5" fill="#ffd4bd" />
    <circle cx="82" cy="372" r="5" fill="#ffd4bd" />

    <!-- Tentacle Right 1 -->
    <path d="M260 280 C290 280 340 310 330 350 C320 380 270 380 260 340" fill="none" stroke="#ff7a45" stroke-width="32" stroke-linecap="round" />
    <path d="M260 280 C290 280 340 310 330 350 C320 380 270 380 260 340" fill="none" stroke="#e05822" stroke-width="24" stroke-linecap="round" opacity="0.8" />
    <!-- Suckers on Tentacle Right 1 -->
    <circle cx="332" cy="328" r="5" fill="#ffd4bd" />
    <circle cx="322" cy="358" r="5" fill="#ffd4bd" />
    <circle cx="298" cy="372" r="5" fill="#ffd4bd" />

    <!-- Lower Tentacles -->
    <path d="M160 320 C140 380 100 420 120 450 C135 470 165 460 170 410" fill="none" stroke="#d64911" stroke-width="26" stroke-linecap="round" />
    <path d="M220 320 C240 380 280 420 260 450 C245 470 215 460 210 410" fill="none" stroke="#d64911" stroke-width="26" stroke-linecap="round" />

    <!-- Main Large Octopus Head/Body -->
    <path d="M120 240 C110 140 140 90 190 90 C240 90 270 140 260 240 C260 300 240 320 190 320 C140 320 120 300 120 240 Z" fill="url(#hakBody)" stroke="#ffd4bd" stroke-width="2" />

    <!-- Wise wrinkles on forehead -->
    <path d="M175 125 Q190 120 205 125" fill="none" stroke="#993200" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    <path d="M170 138 Q190 133 210 138" fill="none" stroke="#993200" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />

    <!-- Large calm eyes -->
    <!-- Left Eye -->
    <ellipse cx="155" cy="200" rx="14" ry="10" fill="#010e1a" />
    <ellipse cx="155" cy="200" rx="11" ry="7" fill="#ff7a45" opacity="0.4" />
    <circle cx="151" cy="196" r="3" fill="#ffffff" />
    <path d="M140 188 Q155 182 170 188" fill="none" stroke="#5e1505" stroke-width="3" stroke-linecap="round"/>

    <!-- Right Eye (Wise monocle-covered eye) -->
    <ellipse cx="225" cy="200" rx="14" ry="10" fill="#010e1a" />
    <circle cx="221" cy="196" r="3" fill="#ffffff" />
    <path d="M210 188 Q225 182 240 188" fill="none" stroke="#5e1505" stroke-width="3" stroke-linecap="round"/>

    <!-- ANCIENT GOLD GLASS MONOCLE OVER RIGHT EYE -->
    <circle cx="225" cy="200" r="21" fill="none" stroke="#ffd700" stroke-width="4.5" filter="url(#softGlow)" />
    <circle cx="225" cy="200" r="21" fill="none" stroke="#ffd700" stroke-width="2" />
    <!-- Monocle reflection shine -->
    <path d="M211 190 A 18 18 0 0 1 239 190" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7" />
    <!-- Dangling Monocle Chain -->
    <path d="M246 200 Q265 220 255 260 Q245 300 220 320" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Calm philosophical mouth -->
    <path d="M180 248 Q190 244 200 248" fill="none" stroke="#5e1505" stroke-width="3.5" stroke-linecap="round" />

    <!-- Wise old age spots -->
    <circle cx="140" cy="160" r="3.5" fill="#aa3000" opacity="0.6"/>
    <circle cx="146" cy="154" r="2" fill="#aa3000" opacity="0.6"/>
    <circle cx="234" cy="160" r="3.5" fill="#aa3000" opacity="0.6"/>
    <circle cx="240" cy="154" r="2" fill="#aa3000" opacity="0.6"/>
  </g>

  <!-- Glowing Title Card Accent -->
  <text x="200" y="540" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="bold" font-size="28" fill="#ff7a45" text-anchor="middle" filter="url(#softGlow)">HAKMOON</text>
  <text x="200" y="565" font-family="'JetBrains Mono', monospace" font-size="12" fill="#e5aaa0" text-anchor="middle" letter-spacing="3">THE WISE GUARDIAN</text>
</svg>
