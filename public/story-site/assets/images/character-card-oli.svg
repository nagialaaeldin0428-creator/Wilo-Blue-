<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#021617" />
      <stop offset="50%" stop-color="#08362f" />
      <stop offset="100%" stop-color="#010e0b" />
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ee59d" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0cc2aa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="oliBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2ffd5" />
      <stop offset="55%" stop-color="#56ce73" />
      <stop offset="100%" stop-color="#0a7042" />
    </linearGradient>
    <linearGradient id="oliShell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa500" />
      <stop offset="50%" stop-color="#8b5a00" />
      <stop offset="100%" stop-color="#3d2000" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card Canvas -->
  <rect width="400" height="600" rx="20" fill="url(#bgGrad)" stroke="#134739" stroke-width="4" />
  <rect x="12" y="12" width="376" height="576" rx="14" fill="none" stroke="#1d6652" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" />

  <!-- Radiating Energy Rays & Water Waves -->
  <ellipse cx="200" cy="300" rx="180" ry="180" fill="url(#ringGlow)" />
  <circle cx="200" cy="300" r="120" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,6" opacity="0.2" />

  <!-- Bioluminescent Little Sparkles -->
  <circle cx="90" cy="160" r="5" fill="#facc15" filter="url(#softGlow)" opacity="0.8" />
  <circle cx="310" cy="450" r="4" fill="#6ee7b7" filter="url(#softGlow)" opacity="0.7" />
  <circle cx="330" cy="180" r="3" fill="#38bdf8" filter="url(#softGlow)" opacity="0.6" />

  <!-- OLI SEA TURTLE ARTWORK (Cute Wise Spectacled Turtle) -->
  <g transform="translate(10, 10)">
    <!-- Swirling Propeller Turbo Shell Current Lines (back behind body) -->
    <path d="M70 230 C50 200 10 170 30 140 C50 150 60 170 65 190 Q68 210 70 230" fill="none" stroke="#5eead4" stroke-width="2.5" opacity="0.6" stroke-dasharray="3,3" />

    <!-- Flippers (Arms/fins of turtle) -->
    <path d="M90 280 C60 260 20 220 5 160 C25 170 65 195 90 225 Z" fill="#0c7044" stroke="#e2ffd5" stroke-width="1.5" />
    <path d="M260 270 C290 250 330 210 345 150 C325 160 285 185 260 215 Z" fill="#0c7044" stroke="#e2ffd5" stroke-width="1.5" />

    <!-- Back Fins (feet) -->
    <path d="M120 340 C100 380 70 395 50 390 C60 360 85 345 105 330 Z" fill="#085433" />
    <path d="M230 340 C250 380 280 395 300 390 C290 360 265 345 245 330 Z" fill="#085433" />

    <!-- Giant Turbo Sea Turtle Shell -->
    <path d="M100 290 C100 220 120 170 175 170 C230 170 250 220 250 290 C250 350 230 380 175 380 C120 380 100 350 100 290 Z" fill="url(#oliShell)" stroke="#ffaa00" stroke-width="3" />
    
    <!-- Geometrical Shell Patterns (Turtle scales with gear-like tech look) -->
    <path d="M140 230 L175 200 L210 230 L210 280 L175 310 L140 280 Z" fill="none" stroke="#ffa500" stroke-width="2" opacity="0.8" />
    <path d="M140 230 L107 230" stroke="#ffa500" stroke-width="1.5" opacity="0.7" />
    <path d="M175 200 L175 170" stroke="#ffa500" stroke-width="1.5" opacity="0.7" />
    <path d="M210 230 L243 230" stroke="#ffa500" stroke-width="1.5" opacity="0.7" />
    <path d="M140 280 L107 296" stroke="#ffa500" stroke-width="1.5" opacity="0.7" />
    <path d="M210 280 L243 296" stroke="#ffa500" stroke-width="1.5" opacity="0.7" />
    <path d="M175 310 L175 380" stroke="#ffa500" stroke-width="1.5" opacity="0.7" />

    <!-- Small turbo gear element on back -->
    <circle cx="175" cy="255" r="16" fill="#1e1302" stroke="#ffaa00" stroke-width="1.5" />
    <circle cx="175" cy="255" r="5" fill="#facc15" />

    <!-- Head and Neck popping out of the top -->
    <path d="M145 180 C145 120 155 90 175 90 C195 90 205 120 205 180 Z" fill="url(#oliBody)" stroke="#e2ffd5" stroke-width="2.2" />

    <!-- Cute turtle face -->
    <!-- Large Intelligent Eyes -->
    <circle cx="160" cy="130" r="11" fill="#011b10" />
    <circle cx="160" cy="130" r="2.5" fill="#ffffff" />
    <circle cx="190" cy="130" r="11" fill="#011b10" />
    <circle cx="190" cy="130" r="2.5" fill="#ffffff" />

    <!-- SUPER CUTE ROUND SPECTACLES (GLASSES) -->
    <!-- Left Glass Ring -->
    <circle cx="158" cy="130" r="15" fill="none" stroke="#ffd700" stroke-width="3" filter="url(#softGlow)" />
    <circle cx="158" cy="130" r="15" fill="none" stroke="#ffd700" stroke-width="1.5" />
    <!-- Right Glass Ring -->
    <circle cx="192" cy="130" r="15" fill="none" stroke="#ffd700" stroke-width="3" filter="url(#softGlow)" />
    <circle cx="192" cy="130" r="15" fill="none" stroke="#ffd700" stroke-width="1.5" />
    <!-- Bridge of Glasses -->
    <path d="M173 130 Q175 127 177 130" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" />
    <!-- Side arms of glasses -->
    <path d="M143 130 L136 132" stroke="#ffd700" stroke-width="2" />
    <path d="M207 130 L214 132" stroke="#ffd700" stroke-width="2" />

    <!-- Friendly cheerful smile -->
    <path d="M166 154 Q175 162 184 154" fill="none" stroke="#05301a" stroke-width="3.5" stroke-linecap="round" />

    <!-- Cute little rosy blush -->
    <ellipse cx="147" cy="142" rx="5" ry="2.5" fill="#ff4d7a" opacity="0.5" />
    <ellipse cx="203" cy="142" rx="5" ry="2.5" fill="#ff4d7a" opacity="0.5" />

    <!-- Tiny bubbles showing turbo movements -->
    <circle cx="175" cy="410" r="6" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
    <circle cx="165" cy="430" r="4" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Glowing Title Card Accent -->
  <text x="200" y="540" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="bold" font-size="28" fill="#2ee59d" text-anchor="middle" filter="url(#softGlow)">OLI</text>
  <text x="200" y="565" font-family="'JetBrains Mono', monospace" font-size="12" fill="#9cd9c0" text-anchor="middle" letter-spacing="3">THE CURRENT RIDER</text>
</svg>
