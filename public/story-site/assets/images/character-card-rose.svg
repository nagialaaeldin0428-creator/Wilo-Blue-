<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0518" />
      <stop offset="50%" stop-color="#240c2a" />
      <stop offset="100%" stop-color="#07020d" />
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff75a0" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ff1a6c" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="roseBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0f5" />
      <stop offset="45%" stop-color="#ff6b8b" />
      <stop offset="100%" stop-color="#c1183c" />
    </linearGradient>
    <linearGradient id="coralFin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffbe94" />
      <stop offset="100%" stop-color="#ff3b68" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card Canvas -->
  <rect width="400" height="600" rx="20" fill="url(#bgGrad)" stroke="#5c153a" stroke-width="4" />
  <rect x="12" y="12" width="376" height="576" rx="14" fill="none" stroke="#9e2d63" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" />

  <!-- Radiating Energy Rays & Water Ripples -->
  <ellipse cx="200" cy="300" rx="180" ry="180" fill="url(#ringGlow)" />
  <circle cx="200" cy="300" r="130" fill="none" stroke="#ff5c8a" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.3" />

  <!-- Bioluminescent Floating Rose Dust & Hearts -->
  <circle cx="100" cy="140" r="4" fill="#ff7da7" filter="url(#softGlow)" opacity="0.8" />
  <circle cx="310" cy="160" r="5" fill="#ffd175" filter="url(#softGlow)" opacity="0.75" />
  <path d="M70,440 C70,435 75,430 80,430 C85,430 88,435 88,440 C88,445 82,452 80,455 C78,452 72,445 70,440 Z" fill="#ff4d7a" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="290" cy="460" r="4" fill="#ff7da7" filter="url(#softGlow)" opacity="0.6" />

  <!-- ROSE CURRENT COMPANION ARTWORK (Stylized Magical Sea Spirit) -->
  <g transform="translate(10, -10)">
    <!-- Back wing/fins (glowing coral design) -->
    <path d="M110 220 C70 160 55 130 90 110 C110 120 125 140 135 170 C125 185 115 200 110 220 Z" fill="url(#coralFin)" opacity="0.6" stroke="#fff" stroke-width="1" />
    <path d="M250 210 C300 150 320 130 310 100 C290 105 270 125 255 155 C250 175 248 190 250 210 Z" fill="url(#coralFin)" stroke="#fff" stroke-width="1" />

    <!-- Sleek Mermaid/Dolphin Spirit Body -->
    <path d="M120 270 C110 190 150 140 250 165 C305 180 300 240 280 295 C250 360 180 410 130 380 C110 360 130 320 120 270 Z" fill="url(#roseBody)" stroke="#ffeef5" stroke-opacity="0.9" stroke-width="2.5" />

    <!-- Cute Swished Tail Fin -->
    <path d="M152 385 C140 435 90 460 60 480 C100 450 130 430 150 405 C145 425 130 460 115 490 C140 465 160 430 165 390 Z" fill="url(#coralFin)" stroke="#ffd4df" stroke-width="1.5" />

    <!-- Elegant side coral ribbon fin -->
    <path d="M175 305 C140 330 110 340 85 320 C110 305 140 290 175 280 Z" fill="url(#coralFin)" stroke="#ff75a0" stroke-width="1.5" />

    <!-- Friendly big glossy eyes -->
    <circle cx="225" cy="235" r="16" fill="#18051a" />
    <circle cx="225" cy="235" r="10" fill="#ff3b68" filter="url(#softGlow)" />
    <circle cx="225" cy="235" r="7" fill="#ffaabf" />
    <circle cx="219" cy="229" r="4" fill="#ffffff" />
    <circle cx="229" cy="241" r="1.5" fill="#ffffff" />

    <!-- Warm Loving Smile -->
    <path d="M210 265 C222 278 245 272 250 260" fill="none" stroke="#6b0321" stroke-width="4" stroke-linecap="round" />

    <!-- Cute Rosy Cheek Blush -->
    <ellipse cx="198" cy="250" rx="10" ry="5" fill="#ff1a53" opacity="0.4" filter="url(#softGlow)" />
    <ellipse cx="244" cy="254" rx="8" ry="4" fill="#ff1a53" opacity="0.4" filter="url(#softGlow)" />

    <!-- Bioluminescent floral sparkles or floaties -->
    <circle cx="275" cy="350" r="10" fill="none" stroke="#ffa6c9" stroke-width="2" opacity="0.6" />
    <circle cx="105" cy="210" r="8" fill="none" stroke="#ffa6c9" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- Glowing Title Card Accent -->
  <text x="200" y="540" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="bold" font-size="28" fill="#ff75a0" text-anchor="middle" filter="url(#softGlow)">ROSE</text>
  <text x="200" y="565" font-family="'JetBrains Mono', monospace" font-size="12" fill="#d2a3ba" text-anchor="middle" letter-spacing="3">THE WARM CURRENT</text>
</svg>
